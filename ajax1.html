<!-- 1 Scrivi un documento HTML che permetta di caricare in modo asincrono, mediante posizionamento del mouse su due stringhe di testo,
due diversi documenti HTML in due zone distinte del documento stesso. .--> 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .box {
            width: 45%;
            height: 200px;
            border: 1px solid black;
            padding: 10px;
        }
        .text {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
    </style>
</head> 
<body>
    <h1>Seleziona qui per scrivere in box1</h1>
    <div class="container">
<div class="box" id="box1">
    <p class="text" id="text1">Hover over me to load content 1</p>
</div>
<div class="box" id="box2">
    <p class="text" id="text2">Seleziona qui per scrivere in box2</p>
</div>          
    </div>
    <script>
        document.getElementById('text1').addEventListener('mouseover', function() {
            fetch('content1.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('box1').innerHTML = data;
                });
        });

        document.getElementById('text2').addEventListener('mouseover', function() {
            fetch('content2.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('box2').innerHTML = data;
                });
        });
    </script>
</body>
</html>
