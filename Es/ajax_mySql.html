<!DOCTYPE html>
<html lang="it">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Ajax MySQL - Suggerimenti comuni</title>
	<style>
		.box{
			background-color: azure;
			width: 350px;
			height: 400px;
			overflow: auto;
			padding: 8px;
			border: 1px solid #cfcfcf;
		}
	</style>
</head>
<body>
	<h2>Selezione comuni in base alle iniziali</h2>
	<p><strong>Localit' da cercare:</strong></p>
	<form onsubmit="return false;">
		Nome: <input type="text" id="search" onkeyup="mostra(this.value)" />
	</form>

	<p>Città suggerite:</p>
	<div class="box" id="elenco"></div>

	<script type="text/javascript">
	// Funzione mostra: invia la richiesta AJAX a elabora.php e mostra i risultati
	function mostra(str) {
		var elenco = document.getElementById('elenco');
		if (!elenco) return;

		if (str.length === 0) {
			elenco.innerHTML = '';
			return;
		}

		var ajax;
		if (window.XMLHttpRequest) {
			// modern browsers
			ajax = new XMLHttpRequest();
		} else {
			// older IE
			ajax = new ActiveXObject('Microsoft.XMLHTTP');
		}

		ajax.onreadystatechange = function() {
			if (ajax.readyState === 4) {
				if (ajax.status === 200) {
					var response = ajax.responseText;
					// mostra risposta grezza (il server può restituire HTML o testo formattato)
					elenco.innerHTML = response;
					// Se vuoi elaborare i dati lato client e creare elementi, puoi farlo qui.
				} else {
					elenco.innerHTML = 'Errore nella richiesta: ' + ajax.status;
				}
			}
		};

		// invio della richiesta al server (codifica del parametro)
		ajax.open('GET', 'http://127.0.0.1:5000/elabora?stringa=' + encodeURIComponent(str), true);
		ajax.send();
	}
	</script>
</body>
</html>
